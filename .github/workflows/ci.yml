name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela execuções antigas do mesmo branch/PR quando um novo push chega.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Configurar Python
        run: uv python install 3.11

      - name: Instalar dependências de dev
        run: uv sync --only-group dev

      - name: Checagem de lint
        run: uv run ruff check .

  test:
    name: Testes (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar ffmpeg
        # moviepy/faster-whisper dependem do ffmpeg para processar mídia.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Configurar Python
        run: uv python install 3.11

      - name: Instalar dependências (lock + grupo dev)
        run: uv sync --frozen

      - name: Rodar testes
        run: uv run pytest -q
